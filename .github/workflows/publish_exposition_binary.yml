name: Publish Exposition Binary

on:
  push:
    branches:
      - master
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1

      - name: Package exposition binary
        run: ./scripts/package-exposition-binary.sh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: exposition-linux-x86_64-${{ github.sha }}
          path: dist/
          retention-days: 90

  release:
    name: Attach Release Assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged binary
        uses: actions/download-artifact@v5
        with:
          name: exposition-linux-x86_64-${{ github.sha }}
          path: dist

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes dist/*
          fi
